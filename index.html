<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My HTML Project</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: #38bdf8;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: #e2e8f0;
            margin: 0 15px;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            width: 300px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        footer {
            background: #1e293b;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My HTML Project 🚀</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h2>Welcome to My Repo</h2>
        <p>This is a simple HTML project hosted on GitHub.</p>

        <div class="card">
            <h3>Project 1</h3>
            <p>A cool project description goes here.</p>
        </div>

        <div class="card">
            <h3>Project 2</h3>
            <p>Another project description goes here.</p>
        </div>
    </div>

    <footer>
        <p>© 2026 My HTML Repo | Built by Me</p>
    </footer>

</body>
</html>
